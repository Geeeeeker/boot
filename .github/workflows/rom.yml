name: Download ROM and Upload as 7z Split Volumes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download PixelOS ROM
        run: |
          curl -L -o downloads/PixelOS_raphael-16.2-20260320-1932.zip "https://master.dl.sourceforge.net/project/raphael-sixteen/PixelOS/PixelOS_raphael-16.2-20260320-1932.zip"

      - name: Install 7-Zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Split ROM into 1023MB 7z volumes
        run: |
          cd downloads
          # 7z分卷压缩，每卷1023M，自动生成 .7z.001, .7z.002, ...
          7z a -v1023m PixelOS_raphael-16.2-20260320-1932.7z PixelOS_raphael-16.2-20260320-1932.zip
          # 删除原始zip，节省空间（可选）
          rm PixelOS_raphael-16.2-20260320-1932.zip

      - name: Generate timestamp
        id: timestamp
        run: echo "time=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: downloads/*
          tag_name: pixelos-raphael-${{ steps.timestamp.outputs.time }}
          name: "PixelOS ROM for Raphael (7z split) - ${{ steps.timestamp.outputs.time }}"
          body: |
            This release contains the PixelOS ROM for Raphael, split into 7z volumes due to GitHub size limits.

            **Original ROM**: PixelOS_raphael-16.2-20260320-1932.zip

            **How to extract (Windows/macOS/Linux)**:
            1. Download all parts (`.7z.001`, `.7z.002`, ...) to the same folder.
            2. Right-click the `.7z.001` file and select **"Extract here"** (requires [7-Zip](https://www.7-zip.org/) installed).
            3. The original `PixelOS_raphael-16.2-20260320-1932.zip` will be extracted.

            **For command-line users**:
            ```bash
            7z x PixelOS_raphael-16.2-20260320-1932.7z.001
