name: Download, Split, and Upload ROM

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download PixelOS ROM
        run: |
          curl -L -o downloads/PixelOS_raphael-16.2-20260320-1932.zip "https://master.dl.sourceforge.net/project/raphael-sixteen/PixelOS/PixelOS_raphael-16.2-20260320-1932.zip"

      - name: Split ROM into <2GB parts
        run: |
          cd downloads
          # 分割为 1900MB 的分卷（确保小于 2GB），生成 PixelOS_raphael-16.2-20260320-1932.zip.part*
          split -b 1900M PixelOS_raphael-16.2-20260320-1932.zip PixelOS_raphael-16.2-20260320-1932.zip.part
          # 可选：删除原始文件以节省空间
          rm PixelOS_raphael-16.2-20260320-1932.zip

      - name: Generate timestamp
        id: timestamp
        run: echo "time=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Parts
        uses: softprops/action-gh-release@v2
        with:
          files: downloads/*
          tag_name: pixelos-raphael-${{ steps.timestamp.outputs.time }}
          name: "PixelOS ROM for Raphael (split) - ${{ steps.timestamp.outputs.time }}"
          body: |
            This release contains the PixelOS ROM for Raphael, split into parts due to GitHub size limits.
            **Original ROM**: PixelOS_raphael-16.2-20260320-1932.zip  
            **How to merge**:  
            ```bash
            cat PixelOS_raphael-16.2-20260320-1932.zip.part* > PixelOS_raphael-16.2-20260320-1932.zip
