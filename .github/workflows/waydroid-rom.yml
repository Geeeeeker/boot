name: Download Waydroid Android 13 (lineage-20.0) Images – Extract IMG

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Create downloads directory
        run: mkdir -p downloads extracted

      - name: Download Android 13 (lineage-20.0) zip files
        run: |
          urls=(
            # x86_64
            "https://sourceforge.net/projects/waydroid/files/images/vendor/waydroid_x86_64/lineage-20.0-20260403-MAINLINE-waydroid_x86_64-vendor.zip/download"
            "https://sourceforge.net/projects/waydroid/files/images/system/lineage/waydroid_x86_64/lineage-20.0-20260403-VANILLA-waydroid_x86_64-system.zip/download"
            "https://sourceforge.net/projects/waydroid/files/images/system/lineage/waydroid_x86_64/lineage-20.0-20260403-GAPPS-waydroid_x86_64-system.zip/download"
            # x86
            "https://sourceforge.net/projects/waydroid/files/images/vendor/waydroid_x86/lineage-20.0-20260403-MAINLINE-waydroid_x86-vendor.zip/download"
            "https://sourceforge.net/projects/waydroid/files/images/system/lineage/waydroid_x86/lineage-20.0-20260403-VANILLA-waydroid_x86-system.zip/download"
            "https://sourceforge.net/projects/waydroid/files/images/system/lineage/waydroid_x86/lineage-20.0-20260403-GAPPS-waydroid_x86-system.zip/download"
            # arm64
            "https://sourceforge.net/projects/waydroid/files/images/vendor/waydroid_arm64/lineage-20.0-20260403-MAINLINE-waydroid_arm64-vendor.zip/download"
            "https://sourceforge.net/projects/waydroid/files/images/system/lineage/waydroid_arm64/lineage-20.0-20260403-VANILLA-waydroid_arm64-system.zip/download"
            "https://sourceforge.net/projects/waydroid/files/images/system/lineage/waydroid_arm64/lineage-20.0-20260403-GAPPS-waydroid_arm64-system.zip/download"
            # arm64_only
            "https://sourceforge.net/projects/waydroid/files/images/vendor/waydroid_arm64_only/lineage-20.0-20260403-MAINLINE-waydroid_arm64_only-vendor.zip/download"
            "https://sourceforge.net/projects/waydroid/files/images/system/lineage/waydroid_arm64_only/lineage-20.0-20260403-VANILLA-waydroid_arm64_only-system.zip/download"
            "https://sourceforge.net/projects/waydroid/files/images/system/lineage/waydroid_arm64_only/lineage-20.0-20260403-GAPPS-waydroid_arm64_only-system.zip/download"
            # arm
            "https://sourceforge.net/projects/waydroid/files/images/vendor/waydroid_arm/lineage-20.0-20260403-MAINLINE-waydroid_arm-vendor.zip/download"
            "https://sourceforge.net/projects/waydroid/files/images/system/lineage/waydroid_arm/lineage-20.0-20260403-VANILLA-waydroid_arm-system.zip/download"
            "https://sourceforge.net/projects/waydroid/files/images/system/lineage/waydroid_arm/lineage-20.0-20260402-GAPPS-waydroid_arm-system.zip/download"
          )
          cd downloads
          for url in "${urls[@]}"; do
            filename=$(basename "$(echo "$url" | sed 's|/download$||')")
            echo "Downloading $filename"
            curl -L -o "$filename" "$url"
          done

      - name: Extract all zip files and rename IMGs
        run: |
          cd downloads
          for zipfile in *.zip; do
            # 提取架构、版本、类型信息
            # 文件名示例: lineage-20.0-20260403-MAINLINE-waydroid_x86_64-vendor.zip
            # 提取出类似: lineage-20.0-x86_64-vendor.img
            base=$(basename "$zipfile" .zip)
            # 删除日期和额外字段，保留有意义的部分
            # 使用 sed 删除日期 20260403 或 20260402
            clean=$(echo "$base" | sed -E 's/-20[0-9]{6}//' | sed 's/-MAINLINE//' | sed 's/-GAPPS//' | sed 's/-VANILLA//')
            # clean 类似: lineage-20.0-waydroid_x86_64-vendor 或 lineage-20.0-waydroid_x86_64-system
            # 进一步简化: 去掉 waydroid_ 前缀，保持可读性
            target_name=$(echo "$clean" | sed 's/waydroid_//')
            # 解压
            unzip "$zipfile" -d "../extracted/${target_name}"
            # 假设 zip 内只有一个 .img 文件（system.img 或 vendor.img）
            mv "../extracted/${target_name}"/*.img "../extracted/${target_name}.img"
            rmdir "../extracted/${target_name}"
          done

      - name: List extracted files
        run: ls -lh extracted/

      - name: Generate timestamp
        id: timestamp
        run: echo "time=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release and upload IMGs
        uses: softprops/action-gh-release@v2
        with:
          files: extracted/*
          tag_name: waydroid-android13-img-${{ steps.timestamp.outputs.time }}
          name: "Waydroid Android 13 IMGs - ${{ steps.timestamp.outputs.time }}"
          body: "直接解压后的 system.img / vendor.img，按架构和类型命名。包含 lineage-20.0 (2026-04-03)。"
