name: 清理 Magisk 残留，生成纯净 KSU boot.img (magiskboot)

on:
  workflow_dispatch: # 允许手动触发

jobs:
  clean-boot-img:
    name: 清理 boot.img 中的 Magisk 残留
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4

      - name: 下载官方 Magisk APK 并提取 magiskboot
        run: |
          # 1. 下载官方 Magisk APK
          wget https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk
          # 2. 解压 APK
          unzip -q Magisk-v27.0.apk -d magisk_apk
          # 3. 复制对应的 magiskboot 并赋予执行权限
          cp magisk_apk/lib/x86_64/libmagiskboot.so magiskboot
          chmod +x magiskboot

      - name: 下载待处理的 boot.img
        run: |
          BOOT_IMG_URL="https://github.com/Geeeeeker/boot/releases/download/extracted-roms-20260322-062443/raphael_boot.img"
          wget "$BOOT_IMG_URL" -O boot.img

      - name: 解包 (Unpack) boot.img
        run: |
          ./magiskboot unpack -n boot.img

      - name: 清理 ramdisk 中的 Magisk 残留
        run: |
          # 使用 cpio 命令删除 Magisk 相关目录
          ./magiskboot cpio ramdisk.cpio "rm -r .backup" 2>/dev/null || true
          ./magiskboot cpio ramdisk.cpio "rm -r .magisk" 2>/dev/null || true
          ./magiskboot cpio ramdisk.cpio "rm -r overlay.d" 2>/dev/null || true

      - name: 重新打包 (Repack) 为新的 boot.img
        run: |
          ./magiskboot repack -n boot.img new-boot.img

      - name: 上传处理后的 boot.img
        uses: actions/upload-artifact@v4
        with:
          name: clean-ksu-boot-img
          path: new-boot.img
