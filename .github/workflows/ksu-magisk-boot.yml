name: 基于原厂boot.img生成纯净KSU镜像

on:
  workflow_dispatch:
    inputs:
      stock_boot_url:
        description: '原厂boot.img直链地址'
        required: true
        default: 'https://example.com/stock_boot.img'  # 请替换为实际地址
      ksu_kernel_url:
        description: 'KSU内核(Image.gz-dtb)直链地址'
        required: true
        default: 'https://github.com/你的仓库/releases/download/xxx/Image.gz-dtb'

jobs:
  build-clean-boot:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取mkbootimg工具
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg

      - name: 下载原厂boot.img和KSU内核
        run: |
          wget "${{ github.event.inputs.stock_boot_url }}" -O stock_boot.img
          wget "${{ github.event.inputs.ksu_kernel_url }}" -O Image.gz-dtb
          cp stock_boot.img mkbootimg/
          cp Image.gz-dtb mkbootimg/

      - name: 解包原厂boot.img并替换内核
        run: |
          cd mkbootimg
          # 解包原厂boot.img
          ./unpack_bootimg.py --boot_img stock_boot.img --out unpack_out
          # 获取mkbootimg参数
          mkbootimg_args=$(./unpack_bootimg.py --out unpack_out --boot_img stock_boot.img --format mkbootimg)
          # 用KSU内核替换原内核
          mv ../Image.gz-dtb unpack_out/kernel
          # 重新打包
          eval "./mkbootimg.py $mkbootimg_args -o ../clean_ksu_boot.img"

      - name: 上传纯净KSU boot.img
        uses: actions/upload-artifact@v4
        with:
          name: clean-ksu-boot-img
          path: clean_ksu_boot.img
