name: 彻底清理 Magisk 残留，生成纯净 KSU boot.img (增强版)

on:
  workflow_dispatch: # 允许手动触发

jobs:
  clean-boot-img:
    name: 彻底清理 boot.img 中的 Magisk 残留
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4

      - name: 下载官方 Magisk APK 并提取 magiskboot
        run: |
          wget https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk
          unzip -q Magisk-v27.0.apk -d magisk_apk
          cp magisk_apk/lib/x86_64/libmagiskboot.so magiskboot
          chmod +x magiskboot

      - name: 下载待处理的 boot.img
        run: |
          BOOT_IMG_URL="https://github.com/Geeeeeker/boot/releases/download/extracted-roms-20260322-062443/raphael_boot.img"
          wget "$BOOT_IMG_URL" -O boot.img

      - name: 解包 (Unpack) boot.img
        run: |
          ./magiskboot unpack -n boot.img

      - name: 彻底清理所有 ramdisk 中的 Magisk 残留
        run: |
          # 1. 清理主 ramdisk
          echo ">>> 清理主 ramdisk.cpio"
          ./magiskboot cpio ramdisk.cpio \
            "rm -r .magisk" \
            "rm -r .backup" \
            "rm -r overlay.d" \
            "rm magisk32" \
            "rm magisk64" \
            "rm magiskinit" \
            "rm init.magisk.rc" 2>/dev/null || true

          # 2. 如果有 vendor_ramdisk 目录，也清理其中的 Magisk 残留
          if [ -d "vendor_ramdisk" ]; then
            echo ">>> 清理 vendor_ramdisk"
            for VENDOR_CPIO in vendor_ramdisk/*.cpio; do
              [ -f "$VENDOR_CPIO" ] && ./magiskboot cpio "$VENDOR_CPIO" \
                "rm -r .magisk" \
                "rm -r .backup" \
                "rm -r overlay.d" \
                "rm magisk32" \
                "rm magisk64" \
                "rm magiskinit" \
                "rm init.magisk.rc" 2>/dev/null || true
            done
          fi

      - name: 重新打包 (Repack) 为新的 boot.img
        run: |
          ./magiskboot repack -n boot.img new-boot.img

      - name: 上传处理后的 boot.img
        uses: actions/upload-artifact@v4
        with:
          name: clean-ksu-boot-img
          path: new-boot.img
